name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  source:
    name: Source (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install source dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          npm --prefix frontend ci
      - name: Verify source
        run: python scripts/verify.py

  browser:
    name: Browser flows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install browser dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -e ".[dev]"
          npm --prefix frontend ci
          npx --prefix frontend playwright install --with-deps chromium
      - name: Run browser flows
        run: npm --prefix frontend run e2e
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: playwright-traces
          path: frontend/test-results

  cpu-image:
    name: CPU image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build CPU image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile
          load: true
          tags: essentia-studio:ci-cpu
      - name: Start and verify CPU image
        run: |
          mkdir -p /tmp/essentia-music /tmp/essentia-data
          chmod 0777 /tmp/essentia-music /tmp/essentia-data
          python scripts/ci/generate_fixture.py /tmp/essentia-music/tone.wav
          chmod 0666 /tmp/essentia-music/tone.wav
          docker run --rm -d --name essentia-studio-cpu -p 18000:8000 \
            -v /tmp/essentia-music:/music -v /tmp/essentia-data:/data \
            essentia-studio:ci-cpu
          for attempt in {1..30}; do
            curl --fail http://127.0.0.1:18000/health && break
            sleep 1
          done
          curl --fail http://127.0.0.1:18000/health
          curl --fail --silent http://127.0.0.1:18000/api/capabilities \
            > /tmp/cpu-capabilities.json
          python scripts/ci/assert_capabilities.py /tmp/cpu-capabilities.json \
            --variant cpu --compute cpu
          docker exec essentia-studio-cpu \
            python /app/scripts/cpu_smoke.py /music/tone.wav
          python scripts/ci/container_api_smoke.py http://127.0.0.1:18000
          docker stop essentia-studio-cpu

  cuda-image:
    name: CUDA image without GPU
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build CUDA image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile.cuda
          load: true
          tags: essentia-studio:ci-cuda
      - name: Verify CPU fallback
        run: |
          mkdir -p /tmp/essentia-music /tmp/essentia-data
          chmod 0777 /tmp/essentia-music /tmp/essentia-data
          docker run --rm -d --name essentia-studio-cuda -p 18001:8000 \
            -v /tmp/essentia-music:/music -v /tmp/essentia-data:/data \
            essentia-studio:ci-cuda
          for attempt in {1..30}; do
            curl --fail http://127.0.0.1:18001/api/capabilities && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18001/api/capabilities \
            > /tmp/cuda-capabilities.json
          python scripts/ci/assert_capabilities.py /tmp/cuda-capabilities.json \
            --variant cuda --compute cpu
          docker stop essentia-studio-cuda
