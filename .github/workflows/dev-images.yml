name: Dev images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      variant:
        description: Image variant to publish manually
        required: true
        default: cuda
        type: choice
        options:
          - cuda
          - onnx
          - cpu
          - both

permissions:
  contents: read

concurrency:
  group: dev-images-${{ github.ref }}-${{ github.event_name }}-${{ inputs.variant || 'cpu' }}
  cancel-in-progress: true

jobs:
  cpu:
    name: Publish CPU dev image
    if: ${{ github.event_name == 'push' || inputs.variant == 'cpu' || inputs.variant == 'both' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish CPU dev image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/skrockle/essentia-studio:dev
            ghcr.io/skrockle/essentia-studio:dev-cpu
          build-args: VERSION=dev
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=dev
          cache-from: type=gha,scope=dev-cpu
          cache-to: type=gha,mode=max,scope=dev-cpu

  cuda:
    name: Publish CUDA dev image
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.variant == 'cuda' || inputs.variant == 'both') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish CUDA dev image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile.cuda
          push: true
          platforms: linux/amd64
          tags: ghcr.io/skrockle/essentia-studio:dev-cuda
          build-args: VERSION=dev
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=dev
          cache-from: type=gha,scope=dev-cuda
          cache-to: type=gha,mode=max,scope=dev-cuda

  onnx:
    name: Publish ONNX CUDA dev image
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.variant == 'onnx' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish ONNX CUDA dev image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile.cuda-onnx
          push: true
          platforms: linux/amd64
          tags: ghcr.io/skrockle/essentia-studio:dev-cuda-onnx
          no-cache: true
          build-args: |
            VERSION=dev
            BUILD_REVISION=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=dev
          cache-from: type=gha,scope=dev-cuda-onnx
          cache-to: type=gha,mode=max,scope=dev-cuda-onnx
      - name: Smoke test published ONNX image
        run: |
          mkdir -p /tmp/essentia-onnx-music /tmp/essentia-onnx-data
          chmod 0777 /tmp/essentia-onnx-music /tmp/essentia-onnx-data
          python scripts/ci/generate_fixture.py /tmp/essentia-onnx-music/tone.wav
          docker run --rm -d --name essentia-studio-onnx-smoke -p 18002:8000 \
            --memory 4g \
            -v /tmp/essentia-onnx-music:/music \
            -v /tmp/essentia-onnx-data:/data \
            ghcr.io/skrockle/essentia-studio:dev-cuda-onnx
          cleanup() { docker logs essentia-studio-onnx-smoke || true; docker stop essentia-studio-onnx-smoke || true; }
          trap cleanup EXIT
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:18002/health; then break; fi
            sleep 2
          done
          curl --fail http://127.0.0.1:18002/health
          python scripts/ci/container_api_smoke.py http://127.0.0.1:18002
          python scripts/ci/benchmark_api_smoke.py http://127.0.0.1:18002
